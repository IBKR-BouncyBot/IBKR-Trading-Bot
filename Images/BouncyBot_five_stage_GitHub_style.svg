<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">BouncyBot five-stage trading strategy</title>
  <desc id="desc">Five GitHub-style cards explaining the BouncyBot trading cycle: track drop, enter, arm exit, exit, and record.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#010409" flood-opacity="0.38"/>
    </filter>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect width="1600" height="520" rx="24" fill="#0d1117"/>

  <!-- 01 -->
  <g transform="translate(34 48)" filter="url(#shadow)">
    <rect width="290" height="424" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <rect x="22" y="22" width="54" height="30" rx="15" fill="#1f6feb"/>
    <text x="49" y="43" text-anchor="middle" class="mono" font-size="15" font-weight="700" fill="#ffffff">01</text>
    <text x="22" y="90" class="mono" font-size="13" font-weight="600" letter-spacing="1.4" fill="#8b949e">TRACK DROP</text>
    <text x="22" y="136" class="ui" font-size="30" font-weight="700" fill="#f0f6fc">Set the anchor</text>
    <path d="M22 171H268" stroke="#30363d" stroke-width="1"/>
    <text x="22" y="216" class="ui" font-size="20" fill="#c9d1d9">
      <tspan x="22" dy="0">Higher prices move the</tspan>
      <tspan x="22" dy="30">anchor up.</tspan>
      <tspan x="22" dy="45">A configured drop from</tspan>
      <tspan x="22" dy="30">that anchor starts the</tspan>
      <tspan x="22" dy="30">BUY setup.</tspan>
    </text>
  </g>

  <!-- 02 -->
  <g transform="translate(344 48)" filter="url(#shadow)">
    <rect width="290" height="424" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <rect x="22" y="22" width="54" height="30" rx="15" fill="#238636"/>
    <text x="49" y="43" text-anchor="middle" class="mono" font-size="15" font-weight="700" fill="#ffffff">02</text>
    <text x="22" y="90" class="mono" font-size="13" font-weight="600" letter-spacing="1.4" fill="#8b949e">ENTER</text>
    <text x="22" y="136" class="ui" font-size="30" font-weight="700" fill="#f0f6fc">Buy the rebound</text>
    <path d="M22 171H268" stroke="#30363d" stroke-width="1"/>
    <text x="22" y="216" class="ui" font-size="20" fill="#c9d1d9">
      <tspan x="22" dy="0">Submit a native trailing</tspan>
      <tspan x="22" dy="30">BUY order.</tspan>
      <tspan x="22" dy="45">When the BUY trail is</tspan>
      <tspan x="22" dy="30">zero, buy at market.</tspan>
    </text>
  </g>

  <!-- 03 -->
  <g transform="translate(654 48)" filter="url(#shadow)">
    <rect width="290" height="424" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <rect x="22" y="22" width="54" height="30" rx="15" fill="#9e6a03"/>
    <text x="49" y="43" text-anchor="middle" class="mono" font-size="15" font-weight="700" fill="#ffffff">03</text>
    <text x="22" y="90" class="mono" font-size="13" font-weight="600" letter-spacing="1.4" fill="#8b949e">ARM EXIT</text>
    <text x="22" y="136" class="ui" font-size="30" font-weight="700" fill="#f0f6fc">Protect profit</text>
    <path d="M22 171H268" stroke="#30363d" stroke-width="1"/>
    <text x="22" y="216" class="ui" font-size="20" fill="#c9d1d9">
      <tspan x="22" dy="0">Use the actual average</tspan>
      <tspan x="22" dy="30">BUY fill as reference.</tspan>
      <tspan x="22" dy="45">Wait until a SELL can</tspan>
      <tspan x="22" dy="30">protect the configured</tspan>
      <tspan x="22" dy="30">minimum gross profit.</tspan>
    </text>
  </g>

  <!-- 04 -->
  <g transform="translate(964 48)" filter="url(#shadow)">
    <rect width="290" height="424" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <rect x="22" y="22" width="54" height="30" rx="15" fill="#a371f7"/>
    <text x="49" y="43" text-anchor="middle" class="mono" font-size="15" font-weight="700" fill="#ffffff">04</text>
    <text x="22" y="90" class="mono" font-size="13" font-weight="600" letter-spacing="1.4" fill="#8b949e">EXIT</text>
    <text x="22" y="136" class="ui" font-size="30" font-weight="700" fill="#f0f6fc">Trail the sell</text>
    <path d="M22 171H268" stroke="#30363d" stroke-width="1"/>
    <text x="22" y="216" class="ui" font-size="20" fill="#c9d1d9">
      <tspan x="22" dy="0">Submit a native trailing</tspan>
      <tspan x="22" dy="30">SELL order.</tspan>
      <tspan x="22" dy="45">When the SELL trail is</tspan>
      <tspan x="22" dy="30">zero, sell at market.</tspan>
    </text>
  </g>

  <!-- 05 -->
  <g transform="translate(1274 48)" filter="url(#shadow)">
    <rect width="290" height="424" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <rect x="22" y="22" width="54" height="30" rx="15" fill="#da3633"/>
    <text x="49" y="43" text-anchor="middle" class="mono" font-size="15" font-weight="700" fill="#ffffff">05</text>
    <text x="22" y="90" class="mono" font-size="13" font-weight="600" letter-spacing="1.4" fill="#8b949e">RECORD</text>
    <text x="22" y="136" class="ui" font-size="30" font-weight="700" fill="#f0f6fc">Close the cycle</text>
    <path d="M22 171H268" stroke="#30363d" stroke-width="1"/>
    <text x="22" y="216" class="ui" font-size="20" fill="#c9d1d9">
      <tspan x="22" dy="0">Save the completed trade</tspan>
      <tspan x="22" dy="30">cycle and its result.</tspan>
      <tspan x="22" dy="45">When auto-repeat is on,</tspan>
      <tspan x="22" dy="30">start another cycle.</tspan>
    </text>
  </g>
</svg>
